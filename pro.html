<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Liyi Gao | Brand Builder & Product Manager</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,700;0,800;1,700;1,800&family=DM+Sans:wght@300;400;500;600&family=Space+Grotesk:wght@500;600;700;800&display=swap" rel="stylesheet">
<style>
/* ============================================================
   DESIGN TOKENS — Warm Silver & Ice Blue System
   ============================================================ */
:root {
  --bg:          #F8F7F5;
  --card-bg:     #FFFFFF;
  --text:        #2C2C2E;
  --muted:       #8E8E93;
  --border:      rgba(0,0,0,0.06);
  --accent:      #2997FF;
  --accent-glow: rgba(41,151,255,0.15);
  --accent-dk:   #0071E3;
  --accent-lt:   rgba(41,151,255,0.06);
  --timeline-bg: rgba(0,0,0,0.10);
  --surface2:    #F2F2F7;
  --nav-bg:      rgba(248,247,245,0.85);
}

*, *::before, *::after { margin:0; padding:0; box-sizing:border-box; }
*:focus { outline: none; }

html { scroll-behavior: smooth; font-size: 15px; width: 100%; height: 100%; }

body {
  background: var(--bg);
  color: var(--text);
  font-family: 'DM Sans', -apple-system, sans-serif;
  line-height: 1.6;
  overflow-x: hidden;
  width: 100%;
  margin: 0;
}

/* ---- Type Scale ---- */
.display   { font-family:'Playfair Display',serif; font-weight:800; letter-spacing:-1px; line-height:1.05; }
.heading   { font-family:'Space Grotesk',sans-serif; font-weight:700; letter-spacing:-0.5px; }
.label     { font-size:.75rem; font-weight:600; letter-spacing:2px; text-transform:uppercase; color:var(--accent); }
strong { font-weight:600; color:var(--accent); }

/* ---- Reveal Animations ---- */
.reveal { opacity:1; transform:none; }
#hero, #hero * { animation-play-state:running !important; }
.will-reveal { opacity:0; transform:translateY(28px); transition:opacity .75s cubic-bezier(.16,1,.3,1), transform .75s cubic-bezier(.16,1,.3,1); }
.will-reveal.active { opacity:1; transform:none; }
.delay-1 { transition-delay:.1s; }
.delay-2 { transition-delay:.2s; }
.delay-3 { transition-delay:.3s; }

/* ---- Buttons ---- */
.btn {
  display:inline-flex; align-items:center; gap:.45rem;
  padding:.55rem 1.2rem; border-radius:40px;
  font-family:'DM Sans',sans-serif; font-size:.85rem; font-weight:600;
  text-decoration:none; cursor:pointer; border:none;
  transition:all .22s cubic-bezier(.16,1,.3,1);
  white-space:nowrap;
}
.btn:hover { transform:translateY(-2px); }
.btn-accent  { background:var(--accent); color:#fff; box-shadow:0 4px 16px var(--accent-glow); }
.btn-accent:hover { background:var(--accent-dk); box-shadow:0 8px 24px rgba(41,151,255,.25); }
.btn-ghost   { border:1.5px solid var(--border); color:var(--text); background:transparent; }
.btn-ghost:hover { border-color:var(--accent); color:var(--accent); }
.btn-solid   { background:var(--text); color:var(--bg); }
.btn-solid:hover { background:var(--accent); }
.btn-pulse { animation: pulse 2.5s ease-in-out infinite; }
@keyframes pulse { 0%,100% { box-shadow:0 4px 16px var(--accent-glow); } 50% { box-shadow:0 4px 28px rgba(41,151,255,.3); } }
@keyframes blink { 0%,100% { opacity:1; } 50% { opacity:.4; } }

/* 全局涂鸦贴纸 */
.doodle-sticker {
  position: absolute; height: auto;
  z-index: -1; pointer-events: none;
  mix-blend-mode: multiply; opacity: 0.06;
  filter: grayscale(100%);
}

.section-wrapper { padding: 4rem 5%; max-width: 1040px; margin: 0 auto; position: relative; z-index: 10; isolation: isolate; }
p, h1, h2, h3, h4, li, figcaption { position: relative; z-index: 2; }

/* ============================================================
   PAGE INTRO
   ============================================================ */
#page-intro { position:fixed; inset:0; z-index:9999; pointer-events:none; display:flex; flex-direction:column; }
.intro-strip {
  flex:1; background:rgba(180,180,188,0.65);
  backdrop-filter:blur(24px) saturate(1.2); -webkit-backdrop-filter:blur(24px) saturate(1.2);
  border-bottom:1px solid rgba(255,255,255,0.3); transform:translateY(0);
  transition:transform .8s cubic-bezier(.76,0,.24,1);
}
.intro-strip:nth-child(1){ transition-delay:.00s; }
.intro-strip:nth-child(2){ transition-delay:.05s; }
.intro-strip:nth-child(3){ transition-delay:.10s; }
.intro-strip:nth-child(4){ transition-delay:.15s; }
.intro-strip:nth-child(5){ transition-delay:.20s; }
.intro-strip:nth-child(6){ transition-delay:.25s; }
#page-intro.done .intro-strip { transform:translateY(-100%); }
#page-intro.gone { display:none; }

.intro-brand { position:fixed; top:50%; left:50%; transform:translate(-50%,-50%); z-index:10000; text-align:center; pointer-events:none; opacity:1; transition:opacity .4s ease .2s; width:100%; }
.intro-brand.fade { opacity:0; }
.intro-name { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(2.5rem,6vw,4rem); font-weight:800; color:#fff; letter-spacing:-1px; text-shadow:0 4px 20px rgba(0,0,0,0.2); animation:introBrandIn .6s cubic-bezier(.16,1,.3,1) .15s both; }
.intro-role { font-family:'Space Grotesk',sans-serif; font-size:.9rem; font-weight:600; color:#fff; letter-spacing:2px; text-transform:uppercase; margin-top:8px; opacity:0; animation:introBrandIn .6s cubic-bezier(.16,1,.3,1) .25s both; }
@keyframes introBrandIn { from { opacity:0; transform:translateY(14px); } to { opacity:1; transform:none; } }

/* ============================================================
   TOP NAV
   ============================================================ */
.top-nav {
  display:flex; align-items:center; justify-content:space-between;
  padding:1.2rem 5%; position:sticky; top:0; z-index:2000;
  backdrop-filter:blur(20px); -webkit-backdrop-filter:blur(20px);
  background:var(--nav-bg); border-bottom:1px solid var(--border);
}
.nav-brand { display:flex; align-items:center; gap:.8rem; }
.nav-brand img { height:26px; object-fit:contain; }
.nav-brand span { font-family:'Space Grotesk',sans-serif; font-size:.85rem; font-weight:600; letter-spacing:.5px; }
.nav-right { display:flex; align-items:center; gap:10px; }

/* Language Pill */
.lang-switcher {
  display:flex; align-items:center;
  background:#FFFFFF; border:1px solid var(--border); border-radius:40px;
  padding:3px; gap:2px;
}
.lang-btn {
  padding:.35rem .9rem; font-size:.78rem; font-weight:600;
  color:var(--muted); text-decoration:none; border-radius:40px; transition:all .2s;
}
.lang-btn.active { background:var(--accent); color:#fff; }

/* Download CV Pill */
.cv-dropdown { position:relative; }
.nav-cv-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:.45rem 1.1rem; font-size:.82rem; font-weight:600;
  background:#FFFFFF; color:var(--text);
  border:1px solid var(--border); border-radius:40px;
  cursor:pointer; transition:all .2s; font-family:'DM Sans',sans-serif;
  white-space:nowrap;
}
.nav-cv-btn:hover { border-color:var(--muted); background:var(--surface2); }
.nav-cv-btn svg { opacity:.6; }

.cv-menu {
  position:absolute; top:calc(100% + 10px); right:0;
  background:var(--card-bg); border:1px solid var(--border);
  border-radius:12px; overflow:hidden; box-shadow:0 12px 30px rgba(0,0,0,.08);
  min-width:180px; opacity:0; transform:translateY(-8px) scale(.97);
  pointer-events:none; transition:all .22s; z-index:9999;
}
.cv-dropdown:hover .cv-menu { opacity:1; transform:translateY(0) scale(1); pointer-events:all; }
.cv-menu a { display:flex; align-items:center; gap:.6rem; padding:.8rem 1.2rem; text-decoration:none; color:var(--text); font-size:.85rem; font-weight:500; transition:background .2s; }
.cv-menu a:hover { background:var(--accent-lt); color:var(--accent); }
.cv-menu a + a { border-top:1px solid var(--border); }

/* LinkedIn Pill */
.nav-linkedin-btn {
  display:inline-flex; align-items:center; gap:6px;
  padding:.45rem 1.1rem; font-size:.82rem; font-weight:600;
  background:var(--accent); color:#fff;
  border-radius:40px; border:none; text-decoration:none;
  transition:all .2s; box-shadow:0 4px 12px var(--accent-glow);
  font-family:'DM Sans',sans-serif; white-space:nowrap;
}
.nav-linkedin-btn:hover { background:var(--accent-dk); transform:translateY(-1px); }

/* ============================================================
   FLOATING BOTTOM NAV
   ============================================================ */
.floating-nav {
  position:fixed; bottom:24px; left:50%; transform:translateX(-50%); z-index:300;
  display:flex; align-items:center; gap:4px; background:rgba(255,255,255,0.92);
  backdrop-filter:blur(24px); border:1px solid var(--border); border-radius:50px;
  padding:6px 10px; box-shadow:0 10px 30px rgba(0,0,0,.1), 0 2px 8px rgba(0,0,0,.05);
}
.fnav-item {
  display:flex; flex-direction:column; align-items:center; gap:2px;
  padding:.5rem 1rem; border-radius:40px; text-decoration:none;
  color:var(--muted); font-size:.65rem; font-weight:600; transition:all .22s; min-width:52px;
}
.fnav-item svg { width:18px; height:18px; stroke:currentColor; fill:none; stroke-width:2; stroke-linecap:round; stroke-linejoin:round; }
.fnav-item:hover, .fnav-item.active { color:var(--accent); background:var(--accent-lt); }

/* ============================================================
   HERO SECTION
   ============================================================ */
.hero {
  display:grid; grid-template-columns:1.1fr 1fr;
  align-items:center; gap:4rem;
  min-height:80vh; padding:4rem 5% 1rem;
  max-width:1040px; margin:0 auto; position:relative; z-index:10;
}
.hero-left { position:relative; max-width:540px; }
.hero-right { position:relative; width:100%; max-width:420px; margin-left:auto; }

.hero-kicker { font-size:0.75rem; font-weight:700; text-transform:uppercase; letter-spacing:2px; color:var(--muted); margin-bottom:1.2rem; border-left:3px solid var(--accent); padding-left:10px; }
.hero-h1 { font-size:clamp(2.5rem,4vw,3.5rem); margin-bottom:1rem; }
.hero-h1 em { color:var(--accent); font-style:italic; }
.hero-desc { font-size:1.05rem; color:var(--text); margin-bottom:2rem; line-height:1.7; }

.skill-tags { display:flex; flex-wrap:wrap; gap:.5rem; margin-top:1.5rem; }
.skill-pill { padding:.3rem .8rem; border:1px solid var(--border); border-radius:6px; font-size:.75rem; font-weight:500; background:var(--card-bg); color:var(--text); transition:border-color .2s; }
.skill-pill:hover { border-color:var(--accent); color:var(--accent); box-shadow:0 2px 8px var(--accent-glow); }

.hero-img-wrap { width:100%; height:55vh; max-height:520px; border-radius:20px; overflow:hidden; clip-path:inset(30% 30% 30% 30% round 20px); animation:expandImg 1.4s cubic-bezier(.16,1,.3,1) .2s forwards; box-shadow:0 20px 40px rgba(0,0,0,.08); border:1px solid var(--border); }
.hero-img-wrap img { width:100%; height:100%; object-fit:cover; object-position:center 20%; transform:scale(1.15); animation:scaleImg 1.4s cubic-bezier(.16,1,.3,1) .2s forwards; }
.hero-name-overlay { position:absolute; bottom:-3%; left:-5%; font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(2.8rem,5vw,4.5rem); font-weight:800; color:#fff; mix-blend-mode:exclusion; z-index:10; opacity:0; animation:fadeUp .9s ease 1.2s forwards; pointer-events:none; }

@keyframes expandImg { to { clip-path:inset(0 0 0 0 round 20px); } }
@keyframes scaleImg  { to { transform:scale(1); } }
@keyframes fadeUp    { from{opacity:0;transform:translateY(16px)} to{opacity:1;transform:none} }

/* ============================================================
   DIARY PARALLAX (Empathy)
   ============================================================ */
.diary-container { height:150vh; position:relative; z-index:15; margin-bottom:-5vh; }
.diary-sticky { position:sticky; top:0; height:100vh; display:flex; align-items:center; justify-content:center; overflow:hidden; }
.diary-text {
  font-size:clamp(2rem,4.5vw,4rem); font-family:'Playfair Display',serif; font-style:italic; font-weight:800;
  color:var(--text); text-align:center; opacity:0; transform:scale(0.9) translateY(20px);
  letter-spacing:-1px; line-height:1.2; will-change:transform, opacity;
}

/* ============================================================
   STORY SECTION: INLINE EXPANSION
   ============================================================ */
#story { background:var(--bg); padding-bottom:4rem; position:relative; }

.story-header { text-align:center; margin-bottom:3rem; }
.story-header .st-eyebrow { font-size:.7rem; font-weight:700; letter-spacing:2px; text-transform:uppercase; color:var(--muted); margin-bottom:.6rem; }
.story-header h2 { font-family:'Playfair Display',serif; font-style:italic; font-size:clamp(1.8rem,3.5vw,2.8rem); font-weight:800; letter-spacing:-1px; line-height:1.1; color:var(--text); }
.story-header .st-sub { font-size:.9rem; color:var(--muted); margin-top:.5rem; }

.timeline-wrapper { position:relative; max-width:800px; margin:0 auto; padding:0 5%; }
.timeline-spine { position:absolute; left:calc(5% + 38px); top:0; bottom:0; width:0; border-left:2px dashed var(--accent); opacity:.25; z-index:1; }

.snode { position:relative; margin-bottom:2.5rem; z-index:2; }
.snode-dot { position:absolute; left:32px; top:25px; width:12px; height:12px; border-radius:50%; background:var(--bg); border:2px solid var(--accent); box-shadow:0 0 0 4px var(--accent-glow); z-index:3; transition:all .3s; }
.snode.open .snode-dot { background:var(--accent); box-shadow:0 0 0 6px var(--accent-glow); }

.snode-trigger { display:flex; align-items:center; gap:1.5rem; padding-left:70px; cursor:pointer; transition:opacity .3s; }
.snode-trigger:hover { opacity:.8; }
.snode-icon { width:64px; height:64px; border-radius:14px; background:var(--card-bg); border:1px solid var(--border); box-shadow:0 8px 16px rgba(0,0,0,0.03); padding:6px; flex-shrink:0; transition:transform .3s, border-color .3s; }
.snode-icon img { width:100%; height:10
